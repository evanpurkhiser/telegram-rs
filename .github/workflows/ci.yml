name: CI

on:
  push:
  pull_request:

jobs:
  build-and-clippy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout tdlib-rs dependency
        uses: actions/checkout@v4
        with:
          repository: FedericoBruzzone/tdlib-rs
          path: ../tdlib-rs

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            gperf \
            clang \
            pkg-config \
            libssl-dev \
            zlib1g-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --all-targets

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
